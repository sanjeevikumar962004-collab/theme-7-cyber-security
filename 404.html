    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; 
            --text-white: #ffffff;
            --text-gray-400: #a1a1aa;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --transition-speed: 0.5s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center;
            background-image: 
                radial-gradient(circle at 50% 50%, var(--accent-glow), transparent 60%);
            overflow: hidden;
        }

        /* 404 Glitch Effect */
        .error-code {
            font-family: var(--font-mono);
            font-size: 10rem;
            font-weight: 700;
            line-height: 1;
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
            letter-spacing: -5px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        .error-code::before, .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        .error-code::before {
            left: 4px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .error-code::after {
            left: -4px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(25px, 9999px, 86px, 0); }
            5% { clip: rect(69px, 9999px, 20px, 0); }
            10% { clip: rect(41px, 9999px, 43px, 0); }
            15% { clip: rect(29px, 9999px, 3px, 0); }
            20% { clip: rect(98px, 9999px, 38px, 0); }
            25% { clip: rect(2px, 9999px, 98px, 0); }
            30% { clip: rect(3px, 9999px, 66px, 0); }
            35% { clip: rect(24px, 9999px, 88px, 0); }
            40% { clip: rect(83px, 9999px, 46px, 0); }
            45% { clip: rect(37px, 9999px, 5px, 0); }
            50% { clip: rect(78px, 9999px, 73px, 0); }
            55% { clip: rect(2px, 9999px, 12px, 0); }
            60% { clip: rect(56px, 9999px, 83px, 0); }
            65% { clip: rect(51px, 9999px, 95px, 0); }
            70% { clip: rect(96px, 9999px, 34px, 0); }
            75% { clip: rect(100px, 9999px, 16px, 0); }
            80% { clip: rect(16px, 9999px, 67px, 0); }
            85% { clip: rect(73px, 9999px, 20px, 0); }
            90% { clip: rect(25px, 9999px, 59px, 0); }
            95% { clip: rect(87px, 9999px, 16px, 0); }
            100% { clip: rect(19px, 9999px, 36px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(27px, 9999px, 49px, 0); }
            5% { clip: rect(26px, 9999px, 65px, 0); }
            10% { clip: rect(20px, 9999px, 3px, 0); }
            15% { clip: rect(11px, 9999px, 2px, 0); }
            20% { clip: rect(4px, 9999px, 12px, 0); }
            25% { clip: rect(69px, 9999px, 15px, 0); }
            30% { clip: rect(61px, 9999px, 24px, 0); }
            35% { clip: rect(62px, 9999px, 4px, 0); }
            40% { clip: rect(30px, 9999px, 83px, 0); }
            45% { clip: rect(60px, 9999px, 55px, 0); }
            50% { clip: rect(98px, 9999px, 40px, 0); }
            55% { clip: rect(40px, 9999px, 83px, 0); }
            60% { clip: rect(98px, 9999px, 63px, 0); }
            65% { clip: rect(8px, 9999px, 84px, 0); }
            70% { clip: rect(76px, 9999px, 2px, 0); }
            75% { clip: rect(68px, 9999px, 23px, 0); }
            80% { clip: rect(4px, 9999px, 18px, 0); }
            85% { clip: rect(54px, 9999px, 48px, 0); }
            90% { clip: rect(67px, 9999px, 63px, 0); }
            95% { clip: rect(68px, 9999px, 58px, 0); }
            100% { clip: rect(31px, 9999px, 63px, 0); }
        }

        .error-title { font-size: 2rem; font-weight: 500; margin-bottom: 16px; letter-spacing: -1px; }
        .error-desc { color: var(--text-gray-400); font-weight: 300; font-family: var(--font-mono); font-size: 0.9rem; max-width: 500px; margin: 0 auto 40px auto; line-height: 1.6; }
        
        .btn-outline {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 16px 36px; background-color: transparent; color: var(--text-white); text-decoration: none;
            font-weight: 500; font-size: 0.9rem; letter-spacing: 0.5px; border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.2); transition: all var(--transition-speed);
        }
        .btn-outline:hover { background-color: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.5); transform: translateY(-2px); }

<style>
/* PRELOADER STYLES */
.preloader-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000000; z-index: 999999;
    display: flex; justify-content: center; align-items: center;
    transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
}
.preloader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.fingerprint-container {
  position: relative;
  width: 160px;
  height: 160px;
  animation: flicker 3s infinite ease-in-out;
  border-radius: 50%;
}

.fingerprint-svg {
  width: 100%;
  height: 100%;
  color: #ffffff;
  filter: drop-shadow(0 0 10px #ffffff);
  transform: scale(1.1);
  transition: transform 0.2s ease, filter 0.3s ease;
}

.fingerprint-path {
  stroke-dasharray: 500;
  stroke-dashoffset: 0;
  animation: draw 4s infinite linear;
}

.scan-line {
  position: absolute; top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(to right, transparent, #ffffff, transparent);
  animation: scan 1s infinite linear;
  opacity: 0.7;
}

.matrix-rain {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0;
  opacity: 0.5; background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), transparent);
  overflow: hidden; border-radius: 50%;
}

.matrix-rain::before {
  content: "101010 1100 0011 0101 1001 1110 0010 1101";
  position: absolute; color: #ffffff; font-size: 14px; opacity: 0.2;
  animation: rain 1.5s infinite linear;
}

.ripple1, .ripple2, .ripple3 {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0;
  border-radius: 50%; border: 2px solid #ffffff; opacity: 0; transform: scale(0);
}

.glow {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0;
  border-radius: 50%; box-shadow: 0 0 20px #ffffff; opacity: 0;
}

.status {
  position: absolute; bottom: -30px; width: 100%; text-align: center;
  color: #ffffff; font-size: 16px; opacity: 0.7; text-transform: uppercase;
  letter-spacing: 2px; animation: glitch-text 2s infinite;
}

/* Animations */
@keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.9; } 75% { opacity: 0.95; } }
@keyframes draw { 0% { stroke-dashoffset: 500; } 100% { stroke-dashoffset: 0; } }
@keyframes scan { 0% { transform: translateY(0); opacity: 0.7; } 50% { opacity: 1; } 100% { transform: translateY(200px); opacity: 0.7; } }
@keyframes rain { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
@keyframes glitch-text { 0% { transform: translate(0); } 20% { transform: translate(-1px, 1px); } 40% { transform: translate(1px, -1px); } 60% { transform: translate(-1px, 0); } 80% { transform: translate(1px, 0); } 100% { transform: translate(0); } }

/* Light Mode Preloader Overrides */
:root[data-theme="light"] .preloader-overlay { background: #ffffff; }
:root[data-theme="light"] .fingerprint-svg { color: #000000; filter: drop-shadow(0 0 10px #000000); }
:root[data-theme="light"] .scan-line { background: linear-gradient(to right, transparent, #000000, transparent); opacity: 0.4; }
:root[data-theme="light"] .matrix-rain { background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), transparent); }
:root[data-theme="light"] .matrix-rain::before { color: #000000; }
:root[data-theme="light"] .ripple1, :root[data-theme="light"] .ripple2, :root[data-theme="light"] .ripple3 { border: 2px solid #000000; }
:root[data-theme="light"] .glow { box-shadow: 0 0 20px #000000; opacity: 0; }
:root[data-theme="light"] .status { color: #000000; }
</style>
</head>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const preloader = document.getElementById('global-preloader');
        if(!preloader) return;
        const minTime = 2000;
        const startTime = Date.now();
        
        const hidePreloader = () => {
            const elapsedTime = Date.now() - startTime;
            const remainingTime = Math.max(0, minTime - elapsedTime);
            setTimeout(() => {
                preloader.classList.add('preloader-hidden');
            }, remainingTime);
        };

        if (document.readyState === 'complete') {
            hidePreloader();
        } else {
            window.addEventListener('load', hidePreloader);
        }
    });
</script>
