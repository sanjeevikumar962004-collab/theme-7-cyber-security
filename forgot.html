    <style>
        :root {
            --bg-color: #000000; 
            --surface: #0a0a0a;
            --text-white: #ffffff;
            --text-black: #000000;
            --text-gray-400: #a1a1aa;
            --text-gray-500: #71717a;
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --accent-secondary: #3b82f6;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition-speed: 0.5s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.05), transparent 50%), radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.05), transparent 40%);
        }
        .auth-card {
            background: var(--surface); border: 1px solid var(--glass-border); padding: 48px; border-radius: 4px; width: 100%; max-width: 440px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }
        .auth-card::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:2px; background: linear-gradient(90deg, transparent, var(--accent-secondary), transparent);
        }
        .nav-logo { font-size: 1.5rem; font-weight: 800; color: var(--text-white); letter-spacing: 2px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 12px; margin-bottom: 32px; text-decoration: none;}
        .form-group { position: relative; margin-bottom: 24px; text-align: left; }
        .form-input, .form-select {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--glass-border-hover);
            padding: 16px 0; color: var(--text-white); font-family: var(--font-main); font-size: 1rem;
            outline: none; transition: border-color 0.4s; border-radius: 0;
        }
        .form-select { 
            appearance: none; cursor: pointer; color: var(--text-gray-400); 
            background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%23a1a1aa" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>');
            background-repeat: no-repeat;
            background-position: right 0px center;
            background-size: 16px;
        }
        .form-select option { background: var(--bg-color); color: var(--text-white); }
        .form-input:focus, .form-select:focus { border-color: var(--text-white); }
        .form-label {
            position: absolute; top: 16px; left: 0; color: var(--text-gray-500); font-size: 1rem;
            pointer-events: none; transition: all 0.3s ease;
        }
        .form-input:focus ~ .form-label, .form-input:not(:placeholder-shown) ~ .form-label {
            top: -12px; font-size: 0.75rem; color: var(--text-gray-400); font-family: var(--font-mono); letter-spacing: 1px; text-transform: uppercase;
        }
        .btn-solid {
            width: 100%; padding: 16px; background-color: var(--text-white); color: var(--text-black);
            font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px; border-radius: 99px;
            border: none; cursor: pointer; transition: all var(--transition-speed); margin-top: 16px;
        }
        .btn-solid:hover { transform: scale(1.02); box-shadow: 0 15px 35px rgba(255, 255, 255, 0.15); }
        .auth-links { margin-top: 24px; font-size: 0.85rem; font-weight: 300; }
        .auth-links a { color: var(--text-gray-400); text-decoration: none; transition: color 0.3s; }
        .auth-links a:hover { color: var(--text-white); text-decoration: underline;}
    </style>

<style>
/* PRELOADER STYLES */
.preloader-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000000; z-index: 999999;
    display: flex; justify-content: center; align-items: center;
    transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
}
.preloader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.fingerprint-container {
  position: relative;
  width: 160px;
  height: 160px;
  animation: flicker 3s infinite ease-in-out;
  border-radius: 50%;
}

.fingerprint-svg {
  width: 100%;
  height: 100%;
  color: #ffffff;
  filter: drop-shadow(0 0 10px #ffffff);
  transform: scale(1.1);
  transition: transform 0.2s ease, filter 0.3s ease;
}

.fingerprint-path {
  stroke-dasharray: 500;
  stroke-dashoffset: 0;
  animation: draw 4s infinite linear;
}

.scan-line {
  position: absolute; top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(to right, transparent, #ffffff, transparent);
  animation: scan 1s infinite linear;
  opacity: 0.7;
}

.matrix-rain {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0;
  opacity: 0.5; background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), transparent);
  overflow: hidden; border-radius: 50%;
}

.matrix-rain::before {
  content: "101010 1100 0011 0101 1001 1110 0010 1101";
  position: absolute; color: #ffffff; font-size: 14px; opacity: 0.2;
  animation: rain 1.5s infinite linear;
}

.ripple1, .ripple2, .ripple3 {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0;
  border-radius: 50%; border: 2px solid #ffffff; opacity: 0; transform: scale(0);
}

.glow {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0;
  border-radius: 50%; box-shadow: 0 0 20px #ffffff; opacity: 0;
}

.status {
  position: absolute; bottom: -30px; width: 100%; text-align: center;
  color: #ffffff; font-size: 16px; opacity: 0.7; text-transform: uppercase;
  letter-spacing: 2px; animation: glitch-text 2s infinite;
}

/* Animations */
@keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.9; } 75% { opacity: 0.95; } }
@keyframes draw { 0% { stroke-dashoffset: 500; } 100% { stroke-dashoffset: 0; } }
@keyframes scan { 0% { transform: translateY(0); opacity: 0.7; } 50% { opacity: 1; } 100% { transform: translateY(200px); opacity: 0.7; } }
@keyframes rain { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
@keyframes glitch-text { 0% { transform: translate(0); } 20% { transform: translate(-1px, 1px); } 40% { transform: translate(1px, -1px); } 60% { transform: translate(-1px, 0); } 80% { transform: translate(1px, 0); } 100% { transform: translate(0); } }

/* Light Mode Preloader Overrides */
:root[data-theme="light"] .preloader-overlay { background: #ffffff; }
:root[data-theme="light"] .fingerprint-svg { color: #000000; filter: drop-shadow(0 0 10px #000000); }
:root[data-theme="light"] .scan-line { background: linear-gradient(to right, transparent, #000000, transparent); opacity: 0.4; }
:root[data-theme="light"] .matrix-rain { background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), transparent); }
:root[data-theme="light"] .matrix-rain::before { color: #000000; }
:root[data-theme="light"] .ripple1, :root[data-theme="light"] .ripple2, :root[data-theme="light"] .ripple3 { border: 2px solid #000000; }
:root[data-theme="light"] .glow { box-shadow: 0 0 20px #000000; opacity: 0; }
:root[data-theme="light"] .status { color: #000000; }
</style>
</head>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // In a real scenario, this would send an email. For this task, route to 404.
            window.location.href = '404.html';
        });
    </script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const preloader = document.getElementById('global-preloader');
        if(!preloader) return;
        const minTime = 2000;
        const startTime = Date.now();
        
        const hidePreloader = () => {
            const elapsedTime = Date.now() - startTime;
            const remainingTime = Math.max(0, minTime - elapsedTime);
            setTimeout(() => {
                preloader.classList.add('preloader-hidden');
            }, remainingTime);
        };

        if (document.readyState === 'complete') {
            hidePreloader();
        } else {
            window.addEventListener('load', hidePreloader);
        }
    });
</script>
